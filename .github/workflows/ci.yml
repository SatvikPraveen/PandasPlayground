# ========================================
# 🤖 GitHub Actions - CI Workflow
# ========================================
# Runs tests and code quality checks on every push/PR

name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🐍 Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements_dev.txt

    - name: 🧪 Run tests
      run: |
        pytest -v

    - name: 🧹 Check code formatting (Black)
      run: |
        black --check scripts/ STREAMLIT_App.py pages/ --line-length=120

    - name: 🔍 Lint code (Flake8)
      run: |
        flake8 scripts/ STREAMLIT_App.py pages/ --max-line-length=120 --extend-ignore=E203,W503

  notebook-check:
    name: Validate Notebooks
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🐍 Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install nbconvert jupyter

    - name: ✅ Check notebook syntax
      run: |
        for notebook in notebooks/*.ipynb; do
          echo "Checking $notebook"
          jupyter nbconvert --to notebook --execute --stdout "$notebook" > /dev/null
        done
      continue-on-error: true  # Some notebooks may require data files

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🐳 Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: 🏗️ Build Docker image
      run: |
        docker build -t pandasplayground:latest .

    - name: ✅ Verify Docker image
      run: |
        docker run --rm pandasplayground:latest python --version
